# COCO 2017 dataset http://cocodataset.org - first 128 training images
# Train command: python train.py --data coco128.yaml
# Default dataset location is next to YOLOv5:
#   /parent
#     /datasets/coco128
#     /yolov5


# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: /workspace/SSDA-YOLO/ship_source/ship_source
train_source_real:
  shipA_source/shipA_real/images/train # train images (relative to 'path') 128 images
train_source_fake:
  shipA_source/shipA_fake/images/train # val images (relative to 'path') 128 images
train_target_real:
  shipB_target/shipB_real/images/train # test images (optional)
train_target_fake:
  shipB_target/shipB_fake/images/train
test_target_real:
  shipB_target/shipB_real/images/val
# Classes
nc: 1  # number of classes
names: ['ship']  # class names


